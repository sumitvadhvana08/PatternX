    <style>
        *{

            height: 30vh;

        img{

            width: 75px;
        }
        .left{
            width: 55vw;

            background: radial-gradient(circle,skyblue,#1e0275);

            justify-content: center;
            align-items: center;
            border-radius: 30px;
            margin-right: 4vw;
            color: #1c0366;
        }
        .right{
            border-radius: 25px;

);
        }
        
        .top{
            display: flex;
        }
        .bottom{

        }
        .mid{

        }
        .right{

            justify-content: center;
        }
        button{
            height: 7vh;
            width: 20vw;
            border-radius: 20px;
            margin-left: 10vw;
            margin-right: 10vw;
            background: linear-gradient(90deg, #b0acfd, #3a3de6);
            color: rgb(46, 2, 32);
            font-size: 20px;
        }
        .left{
border-radius: 25px;
        }
        button{
    height:7vh;
    width:20vw;
    border-radius:20px;
    transition:0.3s;
    cursor:pointer;
}

button:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,0.4);
}
@media(max-width:768px){

    .top,
    .mid,
    .bottom{
        flex-direction:column;
        align-items:center;
        height:auto;
        gap:20px;
    }

    .left{
        width:90%;
        margin-right:0;
        height:180px;
    }

    .right{
        width:90%;
        padding:20px 0;
        display:flex;
        flex-direction:column;
        align-items:center;
    }

    button{
               width:200px;
        height:45px;
        font-size:14px;
        margin:8px 0;

    }

    .navbar{
        justify-content:center;
    }

    .navbar h1{
        font-size:28px;
    }

    img{
        width:60px;
        height:60px;
    }
}
